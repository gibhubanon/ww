<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>Spend Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0a' width='100' height='100' rx='20'/><text y='68' x='50' text-anchor='middle' font-size='55'>💸</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- ===== TODAY VIEW ===== -->
    <div id="view-today" class="view active">
      <header class="view-header">
        <h1>Spend Tracker</h1>
        <button id="btn-add-manual" class="header-btn" title="Add transaction">+</button>
      </header>
      <div id="today-summary"></div>
      <div id="today-budget-bar"></div>
      <div id="today-list"></div>
    </div>

    <!-- ===== CATEGORIZE VIEW ===== -->
    <div id="view-categorize" class="view">
      <header class="view-header">
        <button class="back-btn" data-view="today">&larr;</button>
        <h1>Categorize</h1>
      </header>
      <div id="categorize-info"></div>
      <div id="categorize-buttons"></div>
      <div id="subcategory-picker" class="hidden"></div>
    </div>

    <!-- ===== ANALYTICS VIEW ===== -->
    <div id="view-analytics" class="view">
      <header class="view-header">
        <h1>Analytics</h1>
      </header>
      <div id="analytics-toggle"></div>
      <div id="analytics-content"></div>
    </div>

    <!-- ===== SETTINGS VIEW ===== -->
    <div id="view-settings" class="view">
      <header class="view-header">
        <h1>Settings</h1>
      </header>
      <div id="settings-content"></div>
    </div>

    <!-- ===== MANUAL ADD MODAL ===== -->
    <div id="modal-add" class="modal hidden">
      <div class="modal-content">
        <h2>Add Transaction</h2>
        <label>Merchant
          <input type="text" id="add-merchant" placeholder="e.g. Starbucks" autocomplete="off">
        </label>
        <label>Amount
          <input type="text" id="add-amount" placeholder="0.00" inputmode="decimal" autocomplete="off">
        </label>
        <div class="modal-actions">
          <button id="add-cancel" class="btn-secondary">Cancel</button>
          <button id="add-submit" class="btn-primary">Next</button>
        </div>
      </div>
    </div>

    <!-- ===== UNDO TOAST ===== -->
    <div id="undo-toast" class="toast hidden">
      <span id="undo-text"></span>
      <button id="undo-btn">Undo</button>
    </div>

    <!-- ===== BOTTOM NAV ===== -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-view="today">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Today</span>
      </button>
      <button class="nav-btn" data-view="analytics">
        <span class="nav-icon">📈</span>
        <span class="nav-label">Analytics</span>
      </button>
      <button class="nav-btn" data-view="settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </button>
    </nav>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/categorize.js"></script>
  <script src="js/widget.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
